name: CI

# Lint + unit tests on every PR and on main. Guards the dispatch/CWL contracts and
# the client helpers that have no other automated check.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Install (with dev extras)
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Tests
        run: pytest -q
